<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>퍼블리싱 가이드</title>
    <!-- public이 루트이므로 /css로 시작합니다 -->
    <link rel="stylesheet" href="../asset/css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <aside class="aside">
        <div class="inner">
          <h1>
            <a href="">로고영역</a>
          </h1>
          <div class="history_wrap">
            <h2>최근대화</h2>
            <ul class="history_list" data-active-group>
              <li>
                <button type="button" data-active-item class="active">
                  <span class="label">홈</span>
                </button>
              </li>
              <li>
                <button type="button" data-active-item>
                  <span class="label">기업검색</span>
                </button>
              </li>
              <li>
                <button type="button" data-active-item>
                  <span class="label">가망 고객 발굴</span>
                </button>
              </li>
              <li>
                <button type="button" data-active-item>
                  <span class="label">영업활동이력조회</span>
                </button>
              </li>
            </ul>
          </div>
        </div>
      </aside>
      <header class="header">
        <h1>
          <a href="">기업리포트</a>
        </h1>
        <div class="menu">
          <button type="button" class="btn_alarm">알림</button>
          <button type="button" class="btn_menu">메뉴</button>
        </div>
      </header>

      <main class="container">
        <div class="search_wrap">
          <h2 class="title">기업 분석부터 리포트 제작까지 간편하게</h2>
          <p class="text">
            이 서비스는 대기업영업전략부, 기업영업전략부, 신용리스크관리부가
            함께 협업하여 제작되었습니다.
          </p>
          <div class="search_area">
            <input type="search" />
            <button type="button" class="btn_search">검색</button>
          </div>
        </div>
        <aside class="lnb">
          <nav>
            <ul>
              <li><a href="">메뉴1</a></li>
              <li><a href="">메뉴2</a></li>
              <li><a href="">메뉴3</a></li>
            </ul>
          </nav>
        </aside>

        <section class="contents">
          <div class="tab_wrap">
            <!-- 탭 리스트 -->
            <div class="tab_list" role="tablist" aria-label="콘텐츠 탭 메뉴">
              <button
                type="button"
                id="tab-1"
                class="tab_button active"
                role="tab"
                aria-selected="true"
                aria-controls="panel-1"
                tabindex="0"
              >
                탭 메뉴 1
              </button>

              <button
                type="button"
                id="tab-2"
                class="tab_button"
                role="tab"
                aria-selected="false"
                aria-controls="panel-2"
                tabindex="-1"
              >
                탭 메뉴 2
              </button>

              <button
                type="button"
                id="tab-3"
                class="tab_button"
                role="tab"
                aria-selected="false"
                aria-controls="panel-3"
                tabindex="-1"
              >
                탭 메뉴 3
              </button>
            </div>

            <!-- 탭 패널 -->
            <div
              id="panel-1"
              class="tab_panel active"
              role="tabpanel"
              aria-labelledby="tab-1"
              tabindex="0"
            >
              <p>첫 번째 탭 콘텐츠입니다.</p>
            </div>

            <div
              id="panel-2"
              class="tab_panel"
              role="tabpanel"
              aria-labelledby="tab-2"
              tabindex="0"
              hidden
            >
              <p>두 번째 탭 콘텐츠입니다.</p>
            </div>

            <div
              id="panel-3"
              class="tab_panel"
              role="tabpanel"
              aria-labelledby="tab-3"
              tabindex="0"
              hidden
            >
              <p>세 번째 탭 콘텐츠입니다.</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- 공통 스크립트(데이터 바인딩 후 로딩) -->
    <script src="../js/index.js" type="module"></script>
  </body>
</html>
