<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>퍼블리싱 가이드</title>
    <!-- public이 루트이므로 /css로 시작합니다 -->
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="header"></div>
      <div class="container">
        <div class="contents">
          <!-- tab -->
          <div class="tab_wrap">
            <!-- 탭 메뉴 리스트 -->
            <ul class="tab_list" role="tablist" aria-label="콘텐츠 선택">
              <li class="tab_item">
                <button
                  type="button"
                  class="tab_button active"
                  role="tab"
                  aria-selected="true"
                  aria-controls="panel-1"
                  id="tab-1"
                >
                  공지사항
                </button>
              </li>
              <li class="tab_item">
                <button
                  type="button"
                  class="tab_button"
                  role="tab"
                  aria-selected="false"
                  aria-controls="panel-2"
                  id="tab-2"
                  tabindex="-1"
                >
                  보도자료
                </button>
              </li>
            </ul>

            <!-- 탭 패널 (내용 영역) -->
            <div
              class="tab_panel active"
              id="panel-1"
              role="tabpanel"
              aria-labelledby="tab-1"
              tabindex="0"
            >
              <p>공지사항 콘텐츠 영역입니다.</p>
            </div>
            <div
              class="tab_panel"
              id="panel-2"
              role="tabpanel"
              aria-labelledby="tab-2"
              tabindex="0"
              hidden
            >
              <p>보도자료 콘텐츠 영역입니다.</p>
            </div>
          </div>
          <!--// tab -->
        </div>
      </div>
      <div class="footer"></div>
    </div>

    <!-- 스크립트 연결 -->
    <script type="module" src="../../js/index.js"></script>
  </body>
</html>
